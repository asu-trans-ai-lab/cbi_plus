name: Publish cbi-plus to PyPI

# Publishes to PyPI automatically when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret to manage.
# One-time PyPI setup (see docs/RELEASE.md): register the "cbi-plus" project and add a
# Trusted Publisher pointing to  asu-trans-ai-lab/cbi_plus , workflow  publish-pypi.yml ,
# environment  pypi .

on:
  release:
    types: [published]
  workflow_dispatch: {}          # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi            # <-- the GitHub environment PyPI trusted-publishing references
    permissions:
      id-token: write            # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
